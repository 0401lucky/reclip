<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReClip - 免费媒体下载器</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1eb;
      --fg: #3a3a38;
      --accent: #e85d2a;
      --accent-hover: #d04e1f;
      --muted: #9c9889;
      --card: #fff;
      --card-border: #e2ded6;
      --success: #2d8a4e;
      --error: #c43d3d;
      --radius: 14px;
      --shimmer: linear-gradient(90deg, #ebe8e2 25%, #f0ede7 50%, #ebe8e2 75%);
      --mono: 'DM Mono', 'Microsoft YaHei', 'PingFang SC', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    .page {
      max-width: 620px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    .brand { margin-bottom: 48px; }
    .brand h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 4.2rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--fg);
    }
    .brand h1 em { font-style: italic; color: var(--accent); }
    .brand p {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      padding: 18px 20px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 0.88rem;
      outline: none;
      resize: none;
      min-height: 56px;
      transition: border-color 0.25s, box-shadow 0.25s;
      margin-bottom: 6px;
    }
    textarea.cookies-box {
      min-height: 92px;
      font-size: 0.72rem;
      line-height: 1.45;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 93, 42, 0.08);
    }
    textarea::placeholder { color: var(--muted); }

    .hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }
    .cookie-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: -10px;
      margin-bottom: 20px;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .cookie-status::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }
    .cookie-status.ready { color: var(--success); }
    .cookie-status.ready::before { background: var(--success); }
    .cookie-status.warn { color: var(--accent); }
    .cookie-status.warn::before { background: var(--accent); }
    .cookie-status.missing { color: var(--error); }
    .cookie-status.missing::before { background: var(--error); }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
      align-items: center;
    }
    .pill-group {
      display: flex;
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
    }
    .pill {
      padding: 9px 18px;
      font-family: var(--mono);
      font-size: 0.76rem;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .pill.active { background: var(--fg); color: var(--bg); }
    .pill:not(.active):hover { color: var(--fg); }

    .fetch-btn {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .fetch-btn:hover { background: var(--accent-hover); }
    .fetch-btn:active { transform: scale(0.98); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* 卡片 */
    .cards { margin-top: 24px; }

    .card {
      display: flex;
      gap: 14px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 14px;
      margin-bottom: 10px;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      width: 120px;
      min-width: 120px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-border);
      flex-shrink: 0;
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* 无缩略图图标 */
    .card-thumb .no-thumb {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .card-thumb .no-thumb svg {
      width: 28px;
      height: 28px;
      opacity: 0.5;
    }

    /* 加载中的骨架屏 */
    .card-thumb.loading {
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 6px;
    }
    .skeleton-line.short { width: 40%; height: 10px; }
    .skeleton-line.medium { width: 75%; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1rem;
      line-height: 1.3;
      color: var(--fg);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-meta {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-dl-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 7px;
      background: var(--fg);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .card-dl-btn:hover { background: #2d2d2a; }
    .card-dl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .card-dl-btn.done { background: var(--success); color: #fff; }
    .card-dl-btn.error { background: var(--error); color: #fff; }

    .card-status {
      font-size: 0.68rem;
      color: var(--muted);
    }
    .card-status.downloading { color: var(--accent); }
    .card-status.done { color: var(--success); }
    .card-status.error { color: var(--error); }

    .q-chip {
      padding: 4px 10px;
      border: 1.5px solid var(--card-border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .q-chip.active {
      border-color: var(--fg);
      color: var(--fg);
      background: rgba(26,26,24,0.04);
    }
    .q-chip:hover:not(.active) { border-color: var(--muted); }

    /* 错误卡片 */
    .card.card-error {
      border-color: rgba(196, 61, 61, 0.2);
      background: rgba(196, 61, 61, 0.03);
    }
    .card-error-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(196, 61, 61, 0.08);
      color: var(--error);
    }
    .card-error-icon svg {
      width: 24px;
      height: 24px;
    }
    .card-error-msg {
      font-size: 0.72rem;
      color: var(--error);
      margin-top: 2px;
      line-height: 1.4;
    }
    .card-error-url {
      font-size: 0.65rem;
      color: var(--muted);
      word-break: break-all;
      margin-top: 4px;
    }

    /* 全部下载栏 */
    .dl-all-bar {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .dl-all-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: var(--fg);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .dl-all-btn:hover { background: #2d2d2a; }
    .dl-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 48px;
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.8;
    }
    .footer a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--card-border);
    }

    /* 移动端 */
    @media (max-width: 500px) {
      .brand h1 { font-size: 3rem; }
      .page { padding: 40px 16px 60px; }
      .card { flex-direction: column; gap: 10px; }
      .card-thumb {
        width: 100%;
        min-width: unset;
        height: 160px;
      }
      .card-title { white-space: normal; }
      .controls { flex-wrap: wrap; }
      .fetch-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <h1>Re<em>Clip</em></h1>
      <p>免费媒体下载器</p>
    </div>

    <textarea id="urls" placeholder="粘贴一个或多个视频链接..." rows="2"></textarea>
    <p class="hint">多个链接可以用空格、逗号或换行分隔。</p>

    <textarea id="cookies" class="cookies-box" placeholder="可选：临时粘贴 Netscape 格式 cookies.txt 内容..." rows="4"></textarea>
    <p class="hint">留空时会使用服务器默认 Cookies；下载 Twitter/X 敏感或 NSFW 推文时可在这里临时覆盖。</p>
    <div id="cookieStatus" class="cookie-status">正在检查服务端默认 Cookies...</div>

    <div class="controls">
      <div class="pill-group">
        <button class="pill active" data-format="video" onclick="setFormat(this)">MP4</button>
        <button class="pill" data-format="audio" onclick="setFormat(this)">MP3</button>
      </div>
      <button class="fetch-btn" id="goBtn" onclick="go()">获取信息</button>
    </div>

    <div id="cards" class="cards"></div>

    <div class="footer">
      支持 YouTube &middot; TikTok &middot; Instagram &middot; Twitter/X &middot; Reddit &middot; Facebook<br>
      Vimeo &middot; Twitch &middot; Dailymotion &middot; SoundCloud &middot; Loom &middot; Streamable<br>
      Pinterest &middot; Tumblr &middot; Threads &middot; LinkedIn 等 1000+ 网站<br>
      <a href="/admin">后台配置</a>
    </div>
  </div>

  <script>
    let currentFormat = 'video';
    let cardData = [];

    function setFormat(btn) {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFormat = btn.dataset.format;
    }

    function parseUrls(text) {
      return [...new Set(text.split(/[\s,]+/).map(u => u.trim()).filter(u => u.startsWith('http')))];
    }

    function fmtDur(s) {
      if (!s) return '';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function friendlyError(err) {
      if (!err) return '操作失败，请稍后重试';
      if (/[\u4e00-\u9fa5]/.test(err)) return err;
      if (err.includes('Netscape-format cookies') || err.includes('login cookies')) return '这个视频可能需要登录 Cookies，请粘贴 Netscape 格式 cookies.txt 后重试';
      if (err.includes('Cookies were supplied')) return '已提供 Cookies，但平台仍然拒绝访问，请重新导出有效的 cookies.txt 后重试';
      if (err.includes('No video could be found in this tweet')) return '这个 Twitter/X 推文可能需要登录 Cookies';
      if (err.includes('Unsupported URL')) return '暂不支持这个链接';
      if (err.includes('Video unavailable')) return '视频不可用或为私密内容';
      if (err.includes('Private video')) return '这是私密视频';
      if (err.includes('HTTP Error 403')) return '平台拒绝访问';
      if (err.includes('HTTP Error 404')) return '没有找到视频';
      if (err.includes('copyright')) return '视频因版权限制无法下载';
      if (err.includes('geo')) return '视频在当前地区不可用';
      if (err.includes('timed out') || err.includes('Timed out')) return '请求超时，请重试';
      if (err.includes('network') || err.includes('Network')) return '网络错误，请检查连接';
      return err.length > 80 ? err.slice(0, 80) + '...' : err;
    }

    function fmtBytes(bytes) {
      if (!bytes) return '0 B';
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function cookiesSourceLabel(source) {
      if (source === 'manual') return '手动 Cookies';
      if (source === 'server') return '服务端 Cookies';
      return '未使用 Cookies';
    }

    async function refreshCookieStatus() {
      const el = document.getElementById('cookieStatus');
      if (!el) return;
      try {
        const res = await fetch('/api/cookies/status');
        const data = await res.json();
        if (data.available) {
          const validXCookies = data.has_x_domain && data.has_auth_token && data.has_ct0;
          el.className = validXCookies ? 'cookie-status ready' : 'cookie-status warn';
          el.textContent = validXCookies
            ? `服务端默认 Cookies 已加载（${fmtBytes(data.size)}）`
            : `服务端 Cookies 已加载（${fmtBytes(data.size)}），但未检测到完整 X 登录 Cookies`;
        } else {
          el.className = 'cookie-status missing';
          el.textContent = '服务端默认 Cookies 未配置，手机端留空时不会自动登录 X';
        }
      } catch {
        el.className = 'cookie-status missing';
        el.textContent = '无法检查服务端默认 Cookies 状态';
      }
    }

    document.getElementById('urls').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
    });
    refreshCookieStatus();

    function getCookies() {
      return document.getElementById('cookies').value.trim();
    }

    async function go() {
      const urls = parseUrls(document.getElementById('urls').value);
      const cookies = getCookies();
      if (!urls.length) return;

      const btn = document.getElementById('goBtn');
      const container = document.getElementById('cards');
      btn.disabled = true;
      btn.textContent = '获取中...';
      container.innerHTML = '';
      cardData = [];

      for (let i = 0; i < urls.length; i++) {
        const url = urls[i];
        const idx = cardData.length;
        cardData.push({ url, status: 'loading' });
        renderCard(idx);

        try {
          const res = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, cookies }),
          });
          const data = await res.json();
          if (data.error) {
            cardData[idx] = { ...cardData[idx], status: 'info-error', error: data.error };
          } else {
            cardData[idx] = {
              ...cardData[idx],
              status: 'ready',
              title: data.title || '',
              thumbnail: data.thumbnail || '',
              duration: data.duration,
              uploader: data.uploader || '',
              formats: data.formats || [],
              cookiesSource: data.cookies_source || 'none',
              selectedFormatId: data.formats?.[0]?.id || null,
            };
          }
        } catch (err) {
          cardData[idx] = { ...cardData[idx], status: 'info-error', error: err.message };
        }
        renderCard(idx);
      }

      if (cardData.filter(c => c.status === 'ready').length > 1) {
        renderDownloadAll();
      }

      btn.disabled = false;
      btn.textContent = '获取信息';
    }

    function renderCard(idx) {
      const c = cardData[idx];
      let el = document.getElementById(`card-${idx}`);
      if (!el) {
        el = document.createElement('div');
        el.id = `card-${idx}`;
        el.className = 'card';
        document.getElementById('cards').appendChild(el);
      }

      // 加载占位
      if (c.status === 'loading') {
        el.className = 'card';
        el.innerHTML = `
          <div class="card-thumb loading"></div>
          <div class="card-body">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line short"></div>
          </div>
        `;
        return;
      }

      // 错误状态
      if (c.status === 'info-error') {
        el.className = 'card card-error';
        el.innerHTML = `
          <div class="card-thumb">
            <div class="card-error-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title" style="color:var(--error)">无法获取视频信息</div>
            <div class="card-error-msg">${esc(friendlyError(c.error || ''))}</div>
            <div class="card-error-url">${esc(c.url)}</div>
          </div>
        `;
        return;
      }

      // 就绪、下载中、完成和失败状态
      el.className = 'card';
      const isAudio = currentFormat === 'audio';

      let thumbHtml;
      if (isAudio) {
        thumbHtml = `<div class="no-thumb" style="color:var(--accent)"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`;
      } else if (c.thumbnail) {
        thumbHtml = `<img src="${c.thumbnail}" alt="">`;
      } else {
        thumbHtml = `<div class="no-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8" cy="8" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
      }

      let qualityChips = '';
      if (!isAudio && c.formats && c.formats.length > 1) {
        qualityChips = c.formats.map(f =>
          `<button class="q-chip${f.id === c.selectedFormatId ? ' active' : ''}" onclick="pickFormat(${idx}, '${f.id}')">${f.label}</button>`
        ).join('');
      }

      let actionHtml = '';
      if (c.status === 'ready') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">下载</button>${qualityChips}`;
      } else if (c.status === 'downloading') {
        actionHtml = `<span class="card-status downloading"><span class="spin"></span> 下载中...</span>`;
      } else if (c.status === 'done') {
        actionHtml = `<button class="card-dl-btn done" onclick="saveCard(${idx})">保存</button>
          <span class="card-status done">${esc(c.filename || '')}</span>`;
      } else if (c.status === 'error') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">重试</button>
          <span class="card-status error">${esc(friendlyError(c.error || '下载失败'))}</span>`;
      }

      el.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-title">${esc(c.title || '未命名')}</div>
          <div class="card-meta">${esc(c.uploader)}${c.duration ? ' · ' + fmtDur(c.duration) : ''} · ${cookiesSourceLabel(c.cookiesSource)}</div>
          <div class="card-actions">${actionHtml}</div>
        </div>
      `;
    }

    function renderDownloadAll() {
      const existing = document.getElementById('dl-all-bar');
      if (existing) existing.remove();

      const bar = document.createElement('div');
      bar.id = 'dl-all-bar';
      bar.className = 'dl-all-bar';
      bar.innerHTML = `<button class="dl-all-btn" onclick="dlAll()">全部下载</button>`;
      document.getElementById('cards').appendChild(bar);
    }

    function pickFormat(idx, formatId) {
      cardData[idx].selectedFormatId = formatId;
      renderCard(idx);
    }

    async function dlCard(idx) {
      const c = cardData[idx];
      const cookies = getCookies();
      c.status = 'downloading';
      c.error = null;
      renderCard(idx);

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: c.url,
            format: currentFormat,
            format_id: c.selectedFormatId,
            title: c.title || '',
            cookies,
          }),
        });
        const data = await res.json();
        if (data.error) {
          c.status = 'error';
          c.error = data.error;
          renderCard(idx);
          return;
        }
        c.jobId = data.job_id;
        pollCard(idx);
      } catch (err) {
        c.status = 'error';
        c.error = err.message;
        renderCard(idx);
      }
    }

    function pollCard(idx) {
      const c = cardData[idx];
      const iv = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${c.jobId}`);
          const data = await res.json();
          if (data.status === 'done') {
            clearInterval(iv);
            c.status = 'done';
            c.filename = data.filename;
            renderCard(idx);
            saveCard(idx);
          } else if (data.status === 'error') {
            clearInterval(iv);
            c.status = 'error';
            c.error = data.error;
            renderCard(idx);
          }
        } catch {
          clearInterval(iv);
          c.status = 'error';
          c.error = '与服务器连接中断';
          renderCard(idx);
        }
      }, 1000);
    }

    function saveCard(idx) {
      const c = cardData[idx];
      if (!c.jobId) return;
      const a = document.createElement('a');
      a.href = `/api/file/${c.jobId}`;
      a.download = c.filename || '';
      a.click();
    }

    async function dlAll() {
      const btn = document.querySelector('.dl-all-btn');
      if (btn) { btn.disabled = true; btn.textContent = '下载中...'; }

      for (let i = 0; i < cardData.length; i++) {
        if (cardData[i].status === 'ready') {
          await dlCard(i);
        }
      }

      if (btn) { btn.disabled = false; btn.textContent = '全部下载'; }
    }
  </script>
</body>
</html>
